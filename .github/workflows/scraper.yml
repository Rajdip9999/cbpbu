name: CBPBU Scraper

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - run: node app.js
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
